<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoVault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --danger:    #f85149;
      --warn:      #d29922;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
    }
    .logo svg { width: 26px; height: 26px; }
    nav .nav-right { display: flex; align-items: center; gap: 1rem; }
    .badge {
      font-size: .72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: #58a6ff22;
      color: var(--accent);
      border: 1px solid #58a6ff44;
    }

    /* ── LAYOUT ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
    }
    .card-label {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .card-value {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text);
    }
    .card-sub {
      font-size: .82rem;
      margin-top: .3rem;
    }
    .up   { color: var(--accent2); }
    .down { color: var(--danger); }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── BUTTON ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-size: .85rem;
      font-weight: 600;
      padding: .5rem 1rem;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-primary:hover { opacity: .85; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: #f8514922; color: var(--danger); border: 1px solid #f8514944; }
    .btn-danger:hover { background: #f8514933; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: .7rem 1rem;
      text-align: left;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td {
      padding: .9rem 1rem;
      font-size: .9rem;
      vertical-align: middle;
    }
    .coin-cell { display: flex; align-items: center; gap: .7rem; }
    .coin-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700;
      flex-shrink: 0;
    }
    .coin-name  { font-weight: 600; }
    .coin-tick  { font-size: .76rem; color: var(--muted); }
    .text-right { text-align: right; }
    .text-mono  { font-variant-numeric: tabular-nums; }

    /* ── MINI SPARKLINE ── */
    .spark { width: 80px; height: 32px; }

    /* ── ADD ASSET PANEL ── */
    .add-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      margin-top: 2rem;
      display: none;
    }
    .add-panel.open { display: block; }
    .add-panel h3 { font-size: .95rem; margin-bottom: 1rem; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: .8rem;
      align-items: end;
    }
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr 1fr; }
    }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    .form-group label { font-size: .77rem; color: var(--muted); }
    .form-group select,
    .form-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .88rem;
      padding: .5rem .75rem;
      outline: none;
      transition: border-color .15s;
    }
    .form-group select:focus,
    .form-group input:focus { border-color: var(--accent); }

    /* ── CHART PLACEHOLDER ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      margin-bottom: 2rem;
    }
    canvas#alloc { max-height: 220px; }
    .chart-row { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
    .chart-left { flex: 0 0 220px; max-width: 220px; }
    .legend { flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: .5rem; }
    .legend-item { display: flex; align-items: center; gap: .6rem; font-size: .85rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1.1rem;
      font-size: .85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: .9rem;
    }
    .empty svg { width: 48px; height: 48px; margin-bottom: .8rem; opacity: .4; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    CryptoVault
  </a>
  <div class="nav-right">
    <span class="badge" id="lastUpdate">–</span>
  </div>
</nav>

<!-- MAIN -->
<main>

  <!-- SUMMARY -->
  <div class="summary-grid">
    <div class="card">
      <div class="card-label">Total Portfolio Value</div>
      <div class="card-value" id="totalValue">$0.00</div>
      <div class="card-sub" id="totalChange">–</div>
    </div>
    <div class="card">
      <div class="card-label">24h Gain / Loss</div>
      <div class="card-value" id="dayPnl">$0.00</div>
      <div class="card-sub" id="dayPct">–</div>
    </div>
    <div class="card">
      <div class="card-label">Assets Tracked</div>
      <div class="card-value" id="assetCount">0</div>
      <div class="card-sub" style="color:var(--muted)">in your vault</div>
    </div>
    <div class="card">
      <div class="card-label">Best Performer (24h)</div>
      <div class="card-value" id="bestAsset">–</div>
      <div class="card-sub" id="bestPct">–</div>
    </div>
  </div>

  <!-- ALLOCATION CHART -->
  <div class="chart-wrap">
    <div class="section-header" style="margin-bottom:.8rem">
      <span class="section-title">Allocation</span>
    </div>
    <div class="chart-row">
      <div class="chart-left">
        <canvas id="alloc"></canvas>
      </div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <!-- HOLDINGS -->
  <div class="section-header">
    <span class="section-title">Holdings</span>
    <button class="btn-primary" id="toggleAdd">+ Add Asset</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Asset</th>
          <th>Price</th>
          <th>24h</th>
          <th>Holdings</th>
          <th class="text-right">Value</th>
          <th>7d Trend</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="holdings"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div>No assets yet. Add your first holding above.</div>
    </div>
  </div>

  <!-- ADD PANEL -->
  <div class="add-panel" id="addPanel">
    <h3>Add / Update Asset</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Coin</label>
        <select id="selCoin">
          <option value="BTC">Bitcoin (BTC)</option>
          <option value="ETH">Ethereum (ETH)</option>
          <option value="BNB">BNB (BNB)</option>
          <option value="SOL">Solana (SOL)</option>
          <option value="XRP">XRP (XRP)</option>
          <option value="DOGE">Dogecoin (DOGE)</option>
          <option value="ADA">Cardano (ADA)</option>
          <option value="AVAX">Avalanche (AVAX)</option>
          <option value="MATIC">Polygon (MATIC)</option>
          <option value="DOT">Polkadot (DOT)</option>
          <option value="LINK">Chainlink (LINK)</option>
          <option value="LTC">Litecoin (LTC)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="inputAmt" placeholder="0.00" min="0" step="any" />
      </div>
      <div class="form-group">
        <label>Avg Buy Price (USD)</label>
        <input type="number" id="inputBuy" placeholder="optional" min="0" step="any" />
      </div>
      <button class="btn-primary" id="btnAdd" style="white-space:nowrap">Add to Vault</button>
    </div>
  </div>

</main>

<!-- TOAST -->
<div id="toast"></div>

<script>
(function () {
  "use strict";

  /* ── COIN CATALOGUE ─────────────────────────────────────────────── */
  const COINS = {
    BTC:   { name:"Bitcoin",    color:"#F7931A", price:67420,  chg24:-1.2,  hist:[60000,62500,64000,65100,66000,67200,67420] },
    ETH:   { name:"Ethereum",   color:"#627EEA", price:3540,   chg24: 2.1,  hist:[3100,3200,3300,3420,3480,3520,3540]  },
    BNB:   { name:"BNB",        color:"#F3BA2F", price:595,    chg24: 0.8,  hist:[560,565,570,578,583,590,595]         },
    SOL:   { name:"Solana",     color:"#9945FF", price:178,    chg24: 4.3,  hist:[140,148,155,162,168,174,178]         },
    XRP:   { name:"XRP",        color:"#00AAE4", price:0.62,   chg24:-0.5,  hist:[0.58,0.59,0.60,0.61,0.62,0.62,0.62] },
    DOGE:  { name:"Dogecoin",   color:"#C2A633", price:0.148,  chg24: 6.7,  hist:[0.11,0.12,0.125,0.13,0.135,0.142,0.148] },
    ADA:   { name:"Cardano",    color:"#0033AD", price:0.48,   chg24:-1.8,  hist:[0.50,0.49,0.49,0.48,0.48,0.48,0.48] },
    AVAX:  { name:"Avalanche",  color:"#E84142", price:37.5,   chg24: 3.2,  hist:[32,33,34,35,36,37,37.5]             },
    MATIC: { name:"Polygon",    color:"#8247E5", price:0.72,   chg24: 1.1,  hist:[0.65,0.66,0.67,0.68,0.70,0.71,0.72] },
    DOT:   { name:"Polkadot",   color:"#E6007A", price:7.8,    chg24:-0.3,  hist:[7.5,7.6,7.6,7.7,7.7,7.8,7.8]       },
    LINK:  { name:"Chainlink",  color:"#2A5ADA", price:14.2,   chg24: 2.8,  hist:[12,12.5,13,13.5,13.8,14,14.2]      },
    LTC:   { name:"Litecoin",   color:"#BFBBBB", price:84,     chg24: 0.4,  hist:[79,80,81,82,83,83,84]               },
  };

  /* ── STATE ──────────────────────────────────────────────────────── */
  const STORE_KEY = "cryptovault_holdings";
  let holdings = load();

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch { return []; }
  }
  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(holdings)); }

  /* ── HELPERS ────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const fmt  = n => new Intl.NumberFormat("en-US", { style:"currency", currency:"USD", minimumFractionDigits: n < 1 ? 4 : 2 }).format(n);
  const fmtC = n => new Intl.NumberFormat("en-US", { style:"currency", currency:"USD", minimumFractionDigits:2, maximumFractionDigits:2 }).format(n);
  const fmtP = n => (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
  const cls  = n => n >= 0 ? "up" : "down";

  function toast(msg) {
    const el = $("toast");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2400);
  }

  /* ── SPARKLINE ──────────────────────────────────────────────────── */
  function sparkline(data, color) {
    const W = 80, H = 32, pad = 2;
    const min = Math.min(...data), max = Math.max(...data);
    const range = max - min || 1;
    const pts = data.map((v, i) => [
      pad + (i / (data.length - 1)) * (W - pad * 2),
      H - pad - ((v - min) / range) * (H - pad * 2)
    ]);
    const d = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
    const fill = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ")
      + ` L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g_${color.replace('#','')}" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${fill}" fill="url(#g_${color.replace('#','')})" />
      <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  /* ── DONUT CHART ────────────────────────────────────────────────── */
  let animFrame = null;
  function drawDonut() {
    const canvas = document.getElementById("alloc");
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const size = 220;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width  = size + "px";
    canvas.style.height = size + "px";
    ctx.scale(dpr, dpr);

    ctx.clearRect(0, 0, size, size);
    const cx = size / 2, cy = size / 2, r = 88, inner = 58;

    const total = holdings.reduce((s, h) => s + (COINS[h.symbol]?.price || 0) * h.amount, 0);
    if (!total) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.arc(cx, cy, inner, Math.PI * 2, 0, true);
      ctx.fillStyle = "#21262d";
      ctx.fill();
      return;
    }

    let start = -Math.PI / 2;
    const legendEl = $("legend");
    legendEl.innerHTML = "";

    holdings.forEach(h => {
      const coin = COINS[h.symbol];
      if (!coin) return;
      const val = coin.price * h.amount;
      const pct = val / total;
      const sweep = pct * Math.PI * 2;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, start + sweep);
      ctx.arc(cx, cy, inner, start + sweep, start, true);
      ctx.fillStyle = coin.color;
      ctx.fill();

      start += sweep;

      legendEl.innerHTML += `<div class="legend-item">
        <div class="legend-dot" style="background:${coin.color}"></div>
        <span>${coin.name}</span>
        <span style="margin-left:auto;color:var(--muted)">${(pct * 100).toFixed(1)}%</span>
      </div>`;
    });
  }

  /* ── RENDER TABLE ───────────────────────────────────────────────── */
  function render() {
    const tbody = $("holdings");
    tbody.innerHTML = "";
    $("emptyState").style.display = holdings.length ? "none" : "block";

    let totalVal = 0, totalDay = 0, best = null, bestPct = -Infinity;

    holdings.forEach((h, idx) => {
      const coin = COINS[h.symbol];
      if (!coin) return;
      const value   = coin.price * h.amount;
      const dayDiff = value * coin.chg24 / 100;
      totalVal += value;
      totalDay += dayDiff;

      if (coin.chg24 > bestPct) { bestPct = coin.chg24; best = h.symbol; }

      const pl = h.buyPrice
        ? ((coin.price - h.buyPrice) / h.buyPrice * 100)
        : null;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="color:var(--muted);font-size:.8rem">${idx + 1}</td>
        <td>
          <div class="coin-cell">
            <div class="coin-icon" style="background:${coin.color}22;color:${coin.color}">${h.symbol.charAt(0)}</div>
            <div>
              <div class="coin-name">${coin.name}</div>
              <div class="coin-tick">${h.symbol}</div>
            </div>
          </div>
        </td>
        <td class="text-mono">${fmt(coin.price)}</td>
        <td class="text-mono ${cls(coin.chg24)}">${fmtP(coin.chg24)}</td>
        <td class="text-mono">${h.amount} <span style="color:var(--muted);font-size:.78rem">${h.symbol}</span></td>
        <td class="text-right text-mono">
          ${fmtC(value)}
          ${pl !== null ? `<div class="card-sub ${cls(pl)}" style="font-size:.75rem">${fmtP(pl)} vs cost</div>` : ""}
        </td>
        <td>${sparkline(coin.hist, coin.color)}</td>
        <td>
          <button class="btn-danger" data-idx="${idx}" title="Remove">✕</button>
        </td>`;
      tbody.appendChild(tr);
    });

    /* summary */
    $("totalValue").textContent  = fmtC(totalVal);
    $("totalChange").innerHTML   = `<span class="${cls(totalDay)}">${totalDay >= 0 ? "+" : ""}${fmtC(totalDay)} all time</span>`;
    $("dayPnl").textContent      = (totalDay >= 0 ? "+" : "") + fmtC(totalDay);
    $("dayPnl").className        = "card-value " + cls(totalDay);
    $("dayPct").innerHTML        = `<span class="${cls(totalDay)}">${totalVal ? fmtP(totalDay / totalVal * 100) : "–"} today</span>`;
    $("assetCount").textContent  = holdings.length;
    $("bestAsset").textContent   = best ? (COINS[best]?.name || "–") : "–";
    $("bestPct").innerHTML       = best ? `<span class="up">${fmtP(bestPct)}</span>` : "–";

    /* timestamp */
    $("lastUpdate").textContent  = "Updated " + new Date().toLocaleTimeString();

    drawDonut();
  }

  /* ── ADD ASSET ──────────────────────────────────────────────────── */
  $("toggleAdd").addEventListener("click", () => {
    const panel = $("addPanel");
    panel.classList.toggle("open");
    $("toggleAdd").textContent = panel.classList.contains("open") ? "✕ Cancel" : "+ Add Asset";
  });

  $("btnAdd").addEventListener("click", () => {
    const symbol = $("selCoin").value;
    const amount = parseFloat($("inputAmt").value);
    const buy    = parseFloat($("inputBuy").value) || null;

    if (!symbol || isNaN(amount) || amount <= 0) {
      toast("⚠ Enter a valid coin and amount.");
      return;
    }

    const existing = holdings.findIndex(h => h.symbol === symbol);
    if (existing >= 0) {
      holdings[existing].amount += amount;
      if (buy) holdings[existing].buyPrice = buy;
      toast(`✓ Updated ${symbol} holding.`);
    } else {
      holdings.push({ symbol, amount, buyPrice: buy });
      toast(`✓ Added ${symbol} to your vault.`);
    }

    save();
    $("inputAmt").value = "";
    $("inputBuy").value = "";
    render();
  });

  /* ── REMOVE ─────────────────────────────────────────────────────── */
  $("holdings").addEventListener("click", e => {
    const btn = e.target.closest("[data-idx]");
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx, 10);
    const sym = holdings[idx]?.symbol;
    holdings.splice(idx, 1);
    save();
    toast(`Removed ${sym} from vault.`);
    render();
  });

  /* ── SIMULATE LIVE PRICES (±0.2 % every 8 s) ───────────────────── */
  setInterval(() => {
    Object.values(COINS).forEach(c => {
      const delta = (Math.random() * 0.4 - 0.2) / 100;
      c.price = +(c.price * (1 + delta)).toFixed(c.price > 1 ? 2 : 6);
      c.hist = [...c.hist.slice(1), c.price];
    });
    render();
  }, 8000);

  /* ── INIT ───────────────────────────────────────────────────────── */
  if (holdings.length === 0) {
    holdings = [
      { symbol: "BTC",  amount: 0.25, buyPrice: 52000 },
      { symbol: "ETH",  amount: 2.5,  buyPrice: 2800  },
      { symbol: "SOL",  amount: 15,   buyPrice: 120   },
    ];
    save();
  }
  render();
})();
</script>
